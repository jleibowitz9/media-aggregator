bluesky:
  accounts:
    - figma.com
    - framer.com
    - anthropic.com
    - builtformars.bsky.social

  topics:
    - "app redesign"
    - "design system"
    - "product design case study"
    - "UX research findings"
    - "design tokens"
    - "accessibility audit"
    - "figma update"
    - "design ops"
    - "user testing insights"
    - "mobile UX"

  min_topic_engagement: 10

  # Words that indicate low-quality posts (job ads, self-promo, etc.)
  skip_patterns:
    - "hiring"
    - "we're looking for"
    - "job opening"
    - "apply now"
    - "DM me"
    - "follow me"
    - "link in bio"
    - "check out my"
    - "I'm available for"
    - "open for freelance"

rss:
  feeds:
    - url: https://rittenhouseramblings.com/feed/
      name: Rittenhouse Ramblings
    - url: https://www.lennysnewsletter.com/feed
      name: "Lenny's Newsletter"
    - url: https://blog.duolingo.com/hub/design/rss/
      name: Duolingo Design
    - url: https://www.figma.com/release-notes/feed/atom.xml
      name: Figma Release Notes
    - url: https://news.airbnb.com/feed
      name: Airbnb Product
      categories:
        - Product
    - url: https://daringfireball.net/feeds/main
      name: Daring Fireball
    - url: https://www.theverge.com/rss/index.xml
      name: The Verge

email:
  subject_prefix: "Media Digest"
  max_items_per_section: 15
  max_items_per_feed: 3
